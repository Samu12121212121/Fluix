<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Respuesta</title></head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:Arial,sans-serif;">
<div style="max-width:600px;margin:32px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1);">
  <div style="background:#00796B;padding:32px 24px;text-align:center;">
    <h1 style="color:#fff;margin:0;font-size:22px;">Te han respondido</h1>
    <p style="color:#80CBC4;margin:8px 0 0;font-size:14px;">{{empresaNombre}}</p>
  </div>
  <div style="padding:32px 24px;">
    <p style="font-size:16px;color:#333;margin:0 0 16px;">Hola <strong>{{nombreRemitente}}</strong>,</p>
    <p style="font-size:15px;color:#555;margin:0 0 20px;"><strong>{{empresaNombre}}</strong> ha respondido a tu mensaje:</p>
    <div style="background:#E0F2F1;border-left:4px solid #00796B;border-radius:0 8px 8px 0;padding:20px;margin-bottom:24px;">
      <p style="font-size:12px;color:#00796B;font-weight:700;margin:0 0 8px;">RESPUESTA</p>
      <p style="font-size:15px;color:#333;line-height:1.7;margin:0;white-space:pre-wrap;">{{respuestaTexto}}</p>
    </div>
    <div style="background:#f9f9f9;border-radius:8px;padding:16px;border:1px solid #eee;">
      <p style="font-size:12px;color:#999;font-weight:700;margin:0 0 8px;">TU MENSAJE ORIGINAL</p>
      <p style="font-size:14px;color:#666;line-height:1.6;margin:0;white-space:pre-wrap;">{{mensajeOriginal}}</p>
    </div>
  </div>
  <div style="background:#f5f5f5;padding:20px 24px;text-align:center;border-top:1px solid #eee;">
    <p style="margin:0;font-size:13px;color:#999;">Un saludo,<br><strong style="color:#555;">{{empresaNombre}}</strong></p>
    <p style="margin:8px 0 0;font-size:11px;color:#bbb;">Gestionado con Fluix CRM</p>
  </div>
</div>
</body>
</html>
