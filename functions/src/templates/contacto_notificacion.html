<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuevo mensaje de contacto</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .container { max-width: 580px; margin: 32px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); }
    .header { background: #1976D2; padding: 28px 32px; }
    .header h1 { color: #fff; margin: 0; font-size: 20px; font-weight: 700; }
    .header p { color: rgba(255,255,255,.8); margin: 4px 0 0; font-size: 13px; }
    .body { padding: 28px 32px; }
    .campo { margin-bottom: 20px; }
    .campo label { display: block; font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
    .campo .valor { font-size: 15px; color: #222; line-height: 1.5; }
    .mensaje-box { background: #f8f9fa; border-left: 4px solid #1976D2; border-radius: 0 8px 8px 0; padding: 14px 16px; font-size: 14px; color: #333; line-height: 1.6; white-space: pre-wrap; }
    .footer { background: #fafafa; border-top: 1px solid #f0f0f0; padding: 18px 32px; text-align: center; font-size: 12px; color: #bbb; }
    .badge { display: inline-block; background: #E3F2FD; color: #1976D2; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>✉️ Nuevo mensaje de contacto</h1>
      <p>{{empresa_nombre}} · {{fecha}}</p>
    </div>
    <div class="body">
      <span class="badge">Formulario Web</span>
      <div class="campo">
        <label>Nombre</label>
        <div class="valor">{{nombre}}</div>
      </div>
      <div class="campo">
        <label>Email</label>
        <div class="valor"><a href="mailto:{{email}}" style="color:#1976D2">{{email}}</a></div>
      </div>
      {{#telefono}}
      <div class="campo">
        <label>Teléfono</label>
        <div class="valor">{{telefono}}</div>
      </div>
      {{/telefono}}
      <div class="campo">
        <label>Mensaje</label>
        <div class="mensaje-box">{{mensaje}}</div>
      </div>
    </div>
    <div class="footer">
      Este mensaje fue enviado desde el formulario de contacto de tu web &mdash; Fluix CRM
    </div>
  </div>
</body>
</html>
