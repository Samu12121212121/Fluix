<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sincronizar Carta → App Fluix</title>
    <style>
        body { font-family: system-ui; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f0f4f8; }
        .card { background: white; border-radius: 16px; padding: 40px; max-width: 500px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #1976D2; margin-bottom: 8px; font-size: 24px; }
        p  { color: #666; margin-bottom: 30px; }
        button { background: #1976D2; color: white; border: none; padding: 16px 40px; border-radius: 12px; font-size: 18px; cursor: pointer; width: 100%; font-weight: 600; }
        button:hover { background: #1565C0; }
        button:disabled { background: #90CAF9; cursor: not-allowed; }
        #log { margin-top: 24px; text-align: left; font-size: 13px; color: #333; background: #f9f9f9; border-radius: 8px; padding: 16px; max-height: 300px; overflow-y: auto; display: none; }
        .ok  { color: #2e7d32; }
        .err { color: #c62828; }
        .info{ color: #0277bd; }
        .big { font-size: 48px; margin: 20px 0; }
    </style>
</head>
<body>
<div class="card">
    <div class="big">🔗</div>
    <h1>Sincronizar Carta con la App</h1>
    <p>Pulsa primero <b>"🔍 Detectar ID"</b> para saber qué ID usar, luego sincroniza.</p>

    <input id="empresaInput" type="text" value="fluixtech"
        style="width:100%;padding:12px;border-radius:8px;border:1px solid #ccc;font-size:16px;margin-bottom:12px;box-sizing:border-box;">

    <button onclick="detectarEmpresas()" style="background:#666;margin-bottom:10px;">🔍 Detectar ID de Empresa</button>
    <button id="btn" onclick="sincronizar()">🚀 Sincronizar Ahora</button>
    <div id="log"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ─── CONFIGURACIÓN ────────────────────────────────────────────────────────────
const EMPRESA_ID = "fluixtech";          // ← Tu ID de empresa
const SECCION_ID = "carta_restaurante";  // ← ID de la sección en Firestore

// ─── DATOS DE LA CARTA ────────────────────────────────────────────────────────
// Estos son los platos que hemos visto en tu web.
// Puedes editarlos aquí directamente si quieres cambiar algo.
const CARTA = {
    titulo: "Carta",
    items_carta: [
        { id: "paella_mixta",      nombre: "Paella Mixta",          descripcion: "Arroz con mariscos, pollo y verduras frescas.",                  precio: 15.00, disponible: true, categoria: "Arroces" },
        { id: "tortilla_espanola", nombre: "Tortilla Española",     descripcion: "Huevos, patatas y cebolla caramelizada.",                         precio: 8.00,  disponible: true, categoria: "Entrantes" },
        { id: "gazpacho",          nombre: "Gazpacho",              descripcion: "Sopa fría de tomate con pepino y pimiento.",                       precio: 6.00,  disponible: true, categoria: "Entrantes" },
        { id: "pulpo_gallega",     nombre: "Pulpo a la Gallega",    descripcion: "Pulpo tierno con pimentón y aceite de oliva virgen extra.",        precio: 18.00, disponible: true, categoria: "Pescados" },
        { id: "croquetas_caseras", nombre: "Croquetas Caseras",     descripcion: "Crujientes por fuera, cremosas por dentro con jamón.",             precio: 7.00,  disponible: true, categoria: "Entrantes" },
    ]
};

// ─── FIREBASE ─────────────────────────────────────────────────────────────────
const firebaseConfig = {
    apiKey:        "AIzaSyCVK8AUerxlYcr6N1fZg6t0RL8c7ajfNzU",
    authDomain:    "planeaapp-4bea4.firebaseapp.com",
    projectId:     "planeaapp-4bea4",
    storageBucket: "planeaapp-4bea4.firebasestorage.app",
    messagingSenderId: "1085482191658",
    appId:         "1:1085482191658:web:c5461353b123ab92d62c53"
};

// ─── FUNCIÓN DETECTAR EMPRESAS ────────────────────────────────────────────────
async function detectarEmpresas() {
    const log = document.getElementById('log');
    log.style.display = 'block'; log.innerHTML = '';
    function escribir(msg, tipo='info') { log.innerHTML += `<div class="${tipo}">▸ ${msg}</div>`; }

    let app = firebase.apps.length === 0 ? firebase.initializeApp(firebaseConfig) : firebase.apps[0];
    const db = firebase.firestore();
    escribir('Buscando empresas en Firestore...', 'info');
    try {
        const snap = await db.collection('empresas').get();
        escribir(`Encontradas ${snap.docs.length} empresa(s). Haz clic en la tuya:`, 'ok');
        snap.docs.forEach(doc => {
            const nombre = doc.data().nombre || doc.id;
            log.innerHTML += `<div onclick="document.getElementById('empresaInput').value='${doc.id}'"
                style="background:#e3f2fd;padding:10px;margin:6px 0;border-radius:8px;cursor:pointer;text-align:left">
                <b>ID: ${doc.id}</b> — ${nombre}<br>
                <span style="color:#1976D2;font-size:12px">👆 Clic para usar este ID</span></div>`;
        });
    } catch(e) { escribir('Error: ' + e.message, 'err'); }
}

// ─── FUNCIÓN PRINCIPAL ────────────────────────────────────────────────────────
async function sincronizar() {
    const EMPRESA_ID = document.getElementById('empresaInput').value.trim();
    if (!EMPRESA_ID) { alert('Pon el ID de empresa o usa el botón Detectar primero.'); return; }
    const btn = document.getElementById('btn');
    const log = document.getElementById('log');

    btn.disabled = true;
    btn.textContent = '⏳ Sincronizando...';
    log.style.display = 'block';
    log.innerHTML = '';

    function escribir(msg, tipo = 'info') {
        log.innerHTML += `<div class="${tipo}">▸ ${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    try {
        escribir('Iniciando conexión con Firebase...', 'info');

        // Inicializar Firebase
        let app;
        if (firebase.apps.length === 0) {
            app = firebase.initializeApp(firebaseConfig);
        } else {
            app = firebase.apps[0];
        }
        const db = firebase.firestore();

        escribir('Conexión establecida ✅', 'ok');
        escribir(`Empresa: <strong>${EMPRESA_ID}</strong>`, 'info');
        escribir(`Platos encontrados: <strong>${CARTA.items_carta.length}</strong>`, 'info');
        escribir('Guardando en Firestore...', 'info');

        // Guardar el documento
        await db
            .collection('empresas')
            .doc(EMPRESA_ID)
            .collection('contenido_web')
            .doc(SECCION_ID)
            .set({
                tipo:              'carta',
                nombre:            CARTA.titulo,
                descripcion:       'Carta del restaurante importada desde la web',
                activa:            true,
                orden:             0,
                fecha_creacion:    firebase.firestore.FieldValue.serverTimestamp(),
                fecha_actualizacion: firebase.firestore.FieldValue.serverTimestamp(),
                contenido:         CARTA
            });

        escribir('¡Guardado correctamente en Firebase! ✅', 'ok');
        escribir('', 'info');

        // Verificar que se guardó
        const doc = await db
            .collection('empresas')
            .doc(EMPRESA_ID)
            .collection('contenido_web')
            .doc(SECCION_ID)
            .get();

        if (doc.exists) {
            const data = doc.data();
            escribir(`Verificado: "${data.nombre}" con ${data.contenido.items_carta.length} platos ✅`, 'ok');
        }

        btn.textContent = '✅ ¡Sincronizado!';
        btn.style.background = '#2e7d32';

        escribir('', 'info');
        escribir('🎉 Abre tu App ahora → Módulo "Contenido Web" y deberías ver la carta.', 'ok');

    } catch (error) {
        escribir(`Error: ${error.message}`, 'err');
        escribir('Puede ser un problema de permisos en Firestore. Revisa las reglas.', 'err');
        btn.disabled = false;
        btn.textContent = '🔄 Reintentar';
    }
}
</script>
</body>
</html>
