name: Flutter Tests CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/
      
      - name: Analyze project
        run: flutter analyze --no-fatal-infos
      
      - name: Run unit tests with coverage
        run: flutter test --coverage --reporter=github
      
      - name: Check coverage threshold
        run: |
          # Calcular cobertura aproximada
          TOTAL=$(grep -c "^" coverage/lcov.info 2>/dev/null || echo "0")
          if [ "$TOTAL" -eq "0" ]; then
            echo "⚠️ No coverage data found"
            exit 0
          fi
          
          LINES_FOUND=$(grep "LF:" coverage/lcov.info | awk -F: '{sum+=$2} END {print sum}')
          LINES_HIT=$(grep "LH:" coverage/lcov.info | awk -F: '{sum+=$2} END {print sum}')
          
          if [ "$LINES_FOUND" -gt "0" ]; then
            COVERAGE=$(echo "scale=2; $LINES_HIT * 100 / $LINES_FOUND" | bc)
            echo "📊 Coverage: $COVERAGE% ($LINES_HIT/$LINES_FOUND lines)"
            
            # Umbral mínimo: 30% (subir progresivamente)
            THRESHOLD=30
            if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
              echo "❌ Coverage $COVERAGE% is below threshold $THRESHOLD%"
              exit 1
            fi
          fi
      
      - name: Upload coverage to artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  # Job separado para tests de integración (más lentos)
  integration-test:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Run integration tests
        run: flutter test test/integration/ --reporter=github

