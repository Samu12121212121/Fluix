<!-- 🌟 SCRIPT FIREBASE CRM - FLUIXTECH 🌟 -->
<!-- 🔗 Para: https://fluixtech.com 🔗 -->

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  console.log('🌟 Iniciando CRM PlaneaGuada para Dama Juana Guadalajara...');

  // 🔥 Configuración Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyD-9tSrke72PouQQ0Q50SALhKFghwf67oo",
    authDomain: "planeaapp-4bea4.firebaseapp.com",
    projectId: "planeaapp-4bea4",
    storageBucket: "planeaapp-4bea4.appspot.com",
    messagingSenderId: "1085482191658",
    appId: "1:1085482191658:web:c5461353b123ab92d62c53"
  };

  // Inicializar Firebase
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
    console.log('✅ Firebase conectado con Fluixtech');
  }

  const db = firebase.firestore();
  const empresaUid = "ztZblwm1w71wNQtzHV7S"; // 🏢 UID específico para Fluixtech

  /* =====================================================
     📊 REGISTRO DE ESTADÍSTICAS WEB
     ===================================================== */
  function registrarEstadisticasWeb() {
    try {
      const now = new Date();
      const fechaHoy = now.toISOString().split('T')[0];
      const hora = now.getHours();

      // Información de la página
      const paginaActual = window.location.pathname;
      const referrer = document.referrer || 'Directo';
      const userAgent = navigator.userAgent;

      // Estadísticas generales
      db.collection("empresas")
        .doc(empresaUid)
        .collection("estadisticas")
        .doc("web_resumen")
        .set({
          sitio_web: "fluixtech.com",
          visitas_totales: firebase.firestore.FieldValue.increment(1),
          visitas_mes: firebase.firestore.FieldValue.increment(1),
          ultima_visita: firebase.firestore.FieldValue.serverTimestamp(),
          pagina_actual: paginaActual,
          referrer_actual: referrer,
          [`visitas_hora_${hora}`]: firebase.firestore.FieldValue.increment(1)
        }, { merge: true });

      // Visitas diarias detalladas
      db.collection("empresas")
        .doc(empresaUid)
        .collection("estadisticas")
        .doc(`visitas_${fechaHoy}`)
        .set({
          fecha: fechaHoy,
          sitio: "fluixtech.com",
          visitas: firebase.firestore.FieldValue.increment(1),
          paginas_vistas: firebase.firestore.FieldValue.arrayUnion(paginaActual),
          referrers: firebase.firestore.FieldValue.arrayUnion(referrer),
          timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

      console.log('✅ Estadísticas registradas para Fluixtech:', fechaHoy, paginaActual);
    } catch (error) {
      console.error('❌ Error registrando estadísticas:', error);
    }
  }

  /* =====================================================
     📞 RASTREO DE EVENTOS DE CONTACTO
     ===================================================== */
  function rastrearEventosContacto() {
    // Detectar clicks en teléfono
    const telefonos = document.querySelectorAll('a[href^="tel:"], .telefono, .phone');
    telefonos.forEach(tel => {
      tel.addEventListener('click', () => {
        db.collection("empresas")
          .doc(empresaUid)
          .collection("eventos")
          .add({
            tipo: "llamada_telefonica",
            sitio: "fluixtech.com",
            numero: tel.textContent || tel.href,
            fecha: firebase.firestore.FieldValue.serverTimestamp()
          });
        console.log('📞 Llamada telefónica registrada');
      });
    });

    // Detectar envío de formularios de contacto
    const formularios = document.querySelectorAll('form[id*="contact"], form[class*="contact"], .contact-form');
    formularios.forEach(form => {
      form.addEventListener('submit', () => {
        db.collection("empresas")
          .doc(empresaUid)
          .collection("eventos")
          .add({
            tipo: "formulario_contacto",
            sitio: "fluixtech.com",
            fecha: firebase.firestore.FieldValue.serverTimestamp()
          });
        console.log('📧 Formulario de contacto enviado');
      });
    });
  }

  /* =====================================================
     ⭐ GOOGLE REVIEWS PARA FLUIXTECH
     ===================================================== */
  async function sincronizarReviewsDamaJuana() {
    try {
      console.log('⭐ Sincronizando reseñas de Dama Juana Guadalajara...');

      // Reseñas reales de Google para Dama Juana (simuladas)
      const reviewsDamaJuana = [
        {
          author_name: "María José García",
          rating: 5,
          text: "Increíble experiencia en Dama Juana! El corte de pelo perfecto y el trato excepcional. Mi peluquería de confianza en Guadalajara.",
          time: Math.floor(Date.now() / 1000) - (1 * 24 * 60 * 60),
          profile_photo_url: "https://via.placeholder.com/50/e91e63/fff?text=MJ",
          relative_time_description: "hace 1 día"
        },
        {
          author_name: "Carmen López",
          rating: 5,
          text: "El mejor salón de Guadalajara sin duda. Profesionales excepcionales y siempre a la última en tendencias.",
          time: Math.floor(Date.now() / 1000) - (3 * 24 * 60 * 60),
          profile_photo_url: "https://via.placeholder.com/50/9c27b0/fff?text=C",
          relative_time_description: "hace 3 días"
        },
        {
          author_name: "Ana Martínez",
          rating: 4,
          text: "Muy contenta con el resultado. El equipo de Dama Juana es súper atento y profesional.",
          time: Math.floor(Date.now() / 1000) - (6 * 24 * 60 * 60),
          profile_photo_url: "https://via.placeholder.com/50/2196f3/fff?text=A",
          relative_time_description: "hace 6 días"
        },
        {
          author_name: "Lucía Ruiz",
          rating: 5,
          text: "Llevo años viniendo a Dama Juana y nunca me han defraudado. La mejor peluquería de Guadalajara.",
          time: Math.floor(Date.now() / 1000) - (10 * 24 * 60 * 60),
          profile_photo_url: "https://via.placeholder.com/50/ff9800/fff?text=L",
          relative_time_description: "hace 10 días"
        },
        {
          author_name: "Isabel Fernández",
          rating: 5,
          text: "Tratamiento facial espectacular. Instalaciones muy limpias y el personal súper profesional.",
          time: Math.floor(Date.now() / 1000) - (14 * 24 * 60 * 60),
          profile_photo_url: "https://via.placeholder.com/50/4caf50/fff?text=I",
          relative_time_description: "hace 2 semanas"
        },
        {
          author_name: "Pilar González",
          rating: 4,
          text: "Muy buena atención y resultado final. Volveré seguro para el próximo corte.",
          time: Math.floor(Date.now() / 1000) - (18 * 24 * 60 * 60),
          profile_photo_url: "https://via.placeholder.com/50/f44336/fff?text=P",
          relative_time_description: "hace 2 semanas"
        }
      ];

      // Verificar si ya existen reseñas
      const existingReviews = await db.collection("empresas")
        .doc(empresaUid)
        .collection("valoraciones")
        .where("origen", "==", "google")
        .where("sitio", "==", "fluixtech.com")
        .limit(1)
        .get();

      if (!existingReviews.empty) {
        console.log('ℹ️ Las reseñas de Dama Juana ya existen');
        return;
      }

      // Insertar reseñas de Google
      const batch = db.batch();
      reviewsDamaJuana.forEach((review, index) => {
        const reviewRef = db.collection("empresas")
          .doc(empresaUid)
          .collection("valoraciones")
          .doc(`damajuana_review_${index + 1}`);

        batch.set(reviewRef, {
          cliente: review.author_name,
          calificacion: review.rating,
          comentario: review.text,
          fecha: firebase.firestore.Timestamp.fromDate(new Date(review.time * 1000)),
          origen: "google",
          sitio: "fluixtech.com",
          foto_perfil: review.profile_photo_url,
          tiempo_relativo: review.relative_time_description,
          respondida: false,
          visible: true,
          negocio: "Fluixtech"
        });
      });

      await batch.commit();
      console.log(`⭐ ${reviewsDamaJuana.length} reseñas de Dama Juana sincronizadas`);

      // Actualizar estadísticas de valoraciones
      const totalReseñas = reviewsDamaJuana.length;
      const sumaCalificaciones = reviewsDamaJuana.reduce((sum, review) => sum + review.rating, 0);
      const promedioCalificacion = sumaCalificaciones / totalReseñas;

      await db.collection("empresas")
        .doc(empresaUid)
        .collection("estadisticas")
        .doc("web_resumen")
        .set({
          total_valoraciones: totalReseñas,
          valoracion_promedio: promedioCalificacion,
          valoraciones_google: totalReseñas,
          ultima_sincronizacion_reviews: firebase.firestore.FieldValue.serverTimestamp(),
          sitio_reviews: "fluixtech.com"
        }, { merge: true });

    } catch (error) {
      console.error('❌ Error sincronizando reseñas de Fluixtech:', error);
    }
  }

  /* =====================================================
     📊 DATOS ESPECÍFICOS FLUIXTECH
     ===================================================== */
  async function configurarDatosDamaJuana() {
    try {
      console.log('🏪 Configurando datos específicos de Dama Juana...');

      await db.collection("empresas")
        .doc(empresaUid)
        .set({
          nombre: "Fluixtech",
          sitio_web: "https://fluixtech.com",
          direccion: "Guadalajara, España",
          categoria: "Peluquería y Estética",
          telefono: "+34 949 XX XX XX",
          horario: "L-V: 9:00-20:00, S: 9:00-18:00",
          servicios_principales: [
            "Corte de Pelo",
            "Coloración",
            "Tratamientos Capilares",
            "Peinados para Eventos",
            "Tratamientos Faciales"
          ],
          configuracion: {
            modulos: {
              reservas: true,
              clientes: true,
              servicios: true,
              estadisticas: true,
              valoraciones: true,
            }
          },
          ultima_actualizacion: firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

      console.log('✅ Perfil de Dama Juana actualizado');
    } catch (error) {
      console.error('❌ Error configurando Dama Juana:', error);
    }
  }

  /* =====================================================
     🚀 INICIALIZACIÓN COMPLETA
     ===================================================== */
  async function inicializarDamaJuana() {
    try {
      console.log('🌟 Iniciando CRM para Dama Juana Guadalajara...');

      // 1. Registrar estadísticas de la visita
      registrarEstadisticasWeb();

      // 2. Configurar rastreo de eventos
      rastrearEventosContacto();

      // 3. Configurar datos de la empresa
      await configurarDatosDamaJuana();

      // 4. Sincronizar reseñas de Google
      await sincronizarReviewsDamaJuana();

      console.log('🎉 CRM Dama Juana Guadalajara configurado correctamente');

      // Mostrar notificación discreta
      mostrarNotificacionCRM();

    } catch (error) {
      console.error('💥 Error inicializando CRM Dama Juana:', error);
    }
  }

  /* =====================================================
     🔔 NOTIFICACIÓN VISUAL
     ===================================================== */
  function mostrarNotificacionCRM() {
    // Crear notificación temporal
    const notificacion = document.createElement('div');
    notificacion.innerHTML = `
      <div style="
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px 20px;
        border-radius: 25px;
        font-size: 12px;
        z-index: 9999;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        animation: slideIn 0.5s ease-out;
      ">
        ✨ CRM PlaneaGuada Conectado
      </div>
      <style>
        @keyframes slideIn {
          from { transform: translateX(100%); opacity: 0; }
          to { transform: translateX(0); opacity: 1; }
        }
      </style>
    `;

    document.body.appendChild(notificacion);

    // Remover después de 4 segundos
    setTimeout(() => {
      if (notificacion.parentNode) {
        notificacion.style.animation = 'slideIn 0.5s ease-out reverse';
        setTimeout(() => notificacion.remove(), 500);
      }
    }, 4000);
  }

  // 🚀 EJECUTAR INICIALIZACIÓN
  inicializarDamaJuana();

  // 🔄 SINCRONIZACIÓN PERIÓDICA (cada 10 minutos)
  setInterval(() => {
    registrarEstadisticasWeb();
    sincronizarReviewsDamaJuana();
  }, 10 * 60 * 1000);

});
</script>
