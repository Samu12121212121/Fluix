# ═══════════════════════════════════════════════════════════════════════════════
# Codemagic CI/CD — Compilar Fluix CRM para iOS y Android
# Docs: https://docs.codemagic.io/yaml/yaml-getting-started/
# ═══════════════════════════════════════════════════════════════════════════════

workflows:
  # ─── iOS — App Store ──────────────────────────────────────────────────────
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Fluix tech sl
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.fluixtech.crm \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter build IPA
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # ─── Android — Play Store ─────────────────────────────────────────────────
  android-release:
    name: Android Play Store Release
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: stable
      groups:
        - google_play_credentials  # Configura en Codemagic UI
        - keystore_credentials     # Configura en Codemagic UI
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build AAB
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal  # internal → alpha → beta → production



