# ═══════════════════════════════════════════════════════════════════════════════
# Codemagic CI/CD — Compilar Fluix CRM para iOS y Android
# Docs: https://docs.codemagic.io/yaml/yaml-getting-started/
# ═══════════════════════════════════════════════════════════════════════════════

workflows:
  # ─── iOS — App Store ──────────────────────────────────────────────────────
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fluixtech.crm
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Verificar perfil instalado
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          for f in "$PROFILES_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            security cms -D -i "$f" 2>/dev/null | python3 -c "
import sys, plistlib
data = sys.stdin.buffer.read()
try:
  p = plistlib.loads(data)
  print('Nombre:', p.get('Name'))
  ents = p.get('Entitlements', {})
  print('Sign In with Apple:', 'com.apple.developer.applesignin' in ents)
except Exception as e:
  print('Error:', e)
" || true
          done
      - name: Create export options
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>3AMXPPGLN8</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Verificar perfil instalado
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "=== Perfiles instalados ==="
          for f in "$PROFILES_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            security cms -D -i "$f" 2>/dev/null | python3 -c "
import sys, plistlib
data = sys.stdin.buffer.read()
try:
  p = plistlib.loads(data)
  print('Nombre:', p.get('Name'))
  print('UUID:', p.get('UUID'))
  ents = p.get('Entitlements', {})
  print('Sign In with Apple:', 'com.apple.developer.applesignin' in ents)
  print('Entitlements:', list(ents.keys()))
except Exception as e:
  print('Error:', e)
" || true
          done
      - name: Create export options
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>3AMXPPGLN8</string>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=/tmp/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/ExportOptions.plist
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # ─── Android — Play Store ─────────────────────────────────────────────────
  android-release:
    name: Android Play Store Release
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: stable
      groups:
        - google_play_credentials  # Configura en Codemagic UI
        - keystore_credentials     # Configura en Codemagic UI
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build AAB
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal  # internal → alpha → beta → production



