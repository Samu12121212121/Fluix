# ═══════════════════════════════════════════════════════════════════════════════
# Codemagic CI/CD — Compilar Fluix CRM para iOS y Android
# ═══════════════════════════════════════════════════════════════════════════════

workflows:
  # ─── iOS — App Store ──────────────────────────────────────────────────────
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Fluix tech sl
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.fluixtech.crm
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          keychain add-certificates
          xcode-project use-profiles
      - name: Verificar perfil
        script: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "=== Perfiles instalados ==="
          for f in "$PROFILES_DIR"/*.mobileprovision; do
            [ -f "$f" ] || continue
            DECODED=$(security cms -D -i "$f" 2>/dev/null)
            NAME=$(echo "$DECODED" | grep -A1 "<key>Name</key>" | grep "<string>" | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
            SIWAP=$(echo "$DECODED" | grep -c "applesignin" || true)
            echo "  Nombre: $NAME | Sign In with Apple: $SIWAP"
          done
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # ─── Android — Play Store ─────────────────────────────────────────────────
  android-release:
    name: Android Play Store Release
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: stable
      groups:
        - google_play_credentials
        - keystore_credentials
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build AAB
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
