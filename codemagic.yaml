# ═══════════════════════════════════════════════════════════════════════════════
# Codemagic CI/CD — Compilar Fluix CRM para iOS y Android
# ═══════════════════════════════════════════════════════════════════════════════

workflows:
  # ─── iOS — App Store ──────────────────────────────────────────────────────
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Fluix tech sl
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.fluixtech.crm \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
          # Inyectar UUID del perfil directamente en el proyecto
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_FILE=$(ls "$PROFILES_DIR"/*.mobileprovision 2>/dev/null | head -1)
          if [ -n "$PROFILE_FILE" ]; then
            PROFILE_UUID=$(security cms -D -i "$PROFILE_FILE" 2>/dev/null | \
              grep -A1 "<key>UUID</key>" | grep "<string>" | \
              sed 's/.*<string>\(.*\)<\/string>.*/\1/' | head -1)
            PROFILE_NAME=$(security cms -D -i "$PROFILE_FILE" 2>/dev/null | \
              grep -A1 "<key>Name</key>" | grep "<string>" | \
              sed 's/.*<string>\(.*\)<\/string>.*/\1/' | head -1)
            echo "=== Perfil encontrado: $PROFILE_NAME (UUID: $PROFILE_UUID) ==="
            if [ -n "$PROFILE_UUID" ]; then
              sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\"/PROVISIONING_PROFILE_SPECIFIER = \"$PROFILE_UUID\"/g" \
                ios/Runner.xcodeproj/project.pbxproj
              echo "✅ PROVISIONING_PROFILE_SPECIFIER = $PROFILE_UUID"
              # Actualizar ExportOptions con el nombre del perfil
              sed -i '' "s/<key>signingStyle<\/key>/<key>provisioningProfiles<\/key>\n\t<dict>\n\t\t<key>com.fluixtech.crm<\/key>\n\t\t<string>$PROFILE_NAME<\/string>\n\t<\/dict>\n\t<key>signingStyle<\/key>/g" \
                ios/ExportOptions.plist
            else
              echo "❌ ERROR: No se pudo leer el UUID del perfil"
              exit 1
            fi
          else
            echo "❌ ERROR: No se encontró ningún perfil instalado"
            exit 1
          fi
      - name: Flutter build IPA
        script: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # ─── Android — Play Store ─────────────────────────────────────────────────
  android-release:
    name: Android Play Store Release
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      flutter: stable
      groups:
        - google_play_credentials
        - keystore_credentials
    scripts:
      - name: Install dependencies
        script: |
          flutter pub get
      - name: Build AAB
        script: |
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
