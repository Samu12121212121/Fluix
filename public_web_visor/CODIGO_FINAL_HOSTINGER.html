            storageBucket: "planeaapp-4bea4.firebasestorage.app",
            messagingSenderId: "1085482191658",
            appId: "1:1085482191658:web:c5461353b123ab92d62c53"
        },
        carta:     { id: 'carta',     blockId: 'z1Oz3q' },
        productos: { id: 'productos', blockId: 'zh0Bnf' }
    };

    // MAPA CARTA (IDs de Hostinger)
    var MAPA_CARTA = [
        { hostingerId: 'ai-7JVlSQ', item: 'paella_mixta',      campo: 'nombre' },
        { hostingerId: 'ai-c9wmty', item: 'paella_mixta',      campo: 'descripcion' },
        { hostingerId: 'ai-PPa5hQ', item: 'paella_mixta',      campo: 'precio' },
        { hostingerId: 'ai-SRuENI', item: 'tortilla_espanola', campo: 'nombre' },
        { hostingerId: 'ai-3y3igJ', item: 'tortilla_espanola', campo: 'descripcion' },
        { hostingerId: 'ai-SVrip_', item: 'tortilla_espanola', campo: 'precio' },
        { hostingerId: 'ai-J6nmoh', item: 'gazpacho',          campo: 'nombre' },
        { hostingerId: 'ai-no3Odr', item: 'gazpacho',          campo: 'descripcion' },
        { hostingerId: 'ai-hhwZTU', item: 'gazpacho',          campo: 'precio' },
        { hostingerId: 'ai-5HsDcs', item: 'pulpo_gallega',     campo: 'nombre' },
        { hostingerId: 'ai-Ho562p', item: 'pulpo_gallega',     campo: 'descripcion' },
        { hostingerId: 'ai-dKvHF-', item: 'pulpo_gallega',     campo: 'precio' },
        { hostingerId: 'ai-eEbZC6', item: 'croquetas',         campo: 'nombre' },
        { hostingerId: 'ai-IqRj67', item: 'croquetas',         campo: 'descripcion' },
        { hostingerId: 'ai-tEa_Ri', item: 'croquetas',         campo: 'precio' }
    ];

    function cargarScript(src, cb) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = cb||function(){};
        s.onerror = function(){console.error('Fluix: err '+src)};
        document.head.appendChild(s);
    }
    function fmtPrecio(v) {
        var n = parseFloat(String(v).replace('€','').replace(',','.').trim());
        return isNaN(n) ? String(v) : (Number.isInteger(n) ? n+'€' : n.toFixed(2)+'€');
    }
    function fmtProd(v) {
        var n = parseFloat(String(v).replace('€','').replace(',','.').trim());
        return isNaN(n) ? String(v) : '€'+n.toFixed(2);
    }
    function parsePrecio(t) {
        return parseFloat(String(t).replace('€','').replace(',','.').trim())||0;
    }

    // ── CARTA: marcar DOM con attrs
    function initCarta(db) {
        var sec = document.getElementById(CFG.carta.blockId);
        if (!sec) return; // Si no hay carta en esta página, salimos

        sec.classList.add('fluix-widget');
        sec.setAttribute('data-seccion', CFG.carta.id);

        MAPA_CARTA.forEach(function(e){
            var el = document.getElementById(e.hostingerId);
            if(el) {
                var t = (e.campo.includes('imagen')) ? (el.querySelector('img')||el) : (el.querySelector('strong,p,h6,h5,h4,h3')||el);
                t.setAttribute('data-fluix-item',e.item);
                t.setAttribute('data-fluix-campo',e.campo);
            }
        });
        window._fluixSectionCarta = sec;

        db.collection('empresas').doc(empresaId).collection('contenido_web').doc(CFG.carta.id)
          .onSnapshot(function(doc){
              if(!doc.exists) return;
              var d = doc.data();
              sec.style.display = (d.activa===false) ? 'none' : '';
              var data = {};
              (d.contenido.items_carta||[]).forEach(function(i){ data[i.id]=i; });

              sec.querySelectorAll('[data-fluix-item]').forEach(function(el){
                  var id = el.getAttribute('data-fluix-item'), f=el.getAttribute('data-fluix-campo');
                  if(!data[id]) return;
                  if(data[id].disponible===false) el.closest('.layout-element').style.opacity='0.4';

                  if(f.includes('precio')) el.innerText = fmtPrecio(data[id][f]);
                  else if(f.includes('imagen')) { if(data[id][f]) el.src=data[id][f]; }
                  else el.innerText = data[id][f];
              });
          });
    }

    // ── PRODUCTOS: ya tiene attrs en el HTML
    function initProductos(db) {
        var sec = document.querySelector('[data-seccion="productos"]') || document.getElementById(CFG.productos.blockId);
        if (!sec) return;
        window._fluixSectionProductos = sec;

        db.collection('empresas').doc(empresaId).collection('contenido_web').doc(CFG.productos.id)
          .onSnapshot(function(doc){
              if(!doc.exists) return;
              var d = doc.data();
              sec.style.display = (d.activa===false) ? 'none' : '';
              var data = {};
              (d.contenido.items_carta||[]).forEach(function(i){ data[i.id]=i; });

              sec.querySelectorAll('[data-fluix-item]').forEach(function(el){
                  var id = el.getAttribute('data-fluix-item'), f=el.getAttribute('data-fluix-campo');
                  if(!data[id]) return;
                  var card = el.closest('.product-list-item');
                  if(card) {
                      card.style.opacity = (data[id].disponible===false) ? '0.4' : '';
                      card.style.pointerEvents = (data[id].disponible===false) ? 'none' : '';
                  }

                  if(f==='precio') el.innerText = fmtProd(data[id][f]);
                  else if(f==='imagen') { var u = data[id].imagen||data[id].imagen_url; if(u) { el.src=u; el.srcset=''; } }
                  else el.innerText = data[id][f];
              });
          });
    }

    // ── API PUBLICA
    window.Fluix = {
        sincronizar: function() { // CARTA
            if(!window._fluixSectionCarta) return console.error('No hay carta');
            subir(window._fluixSectionCarta, CFG.carta.id, 'Carta', 'General');
        },
        sincronizarProductos: function() { // PRODUCTOS
            if(!window._fluixSectionProductos) return console.error('No hay productos');
            subir(window._fluixSectionProductos, CFG.productos.id, 'Productos', 'Productos');
        }
    };

    function subir(sec, docId, nombre, cat) {
        var dic={};
        sec.querySelectorAll('[data-fluix-item][data-fluix-campo]').forEach(function(el){
            var id=el.getAttribute('data-fluix-item'), f=el.getAttribute('data-fluix-campo');
            if(!dic[id]) dic[id]={id:id, disponible:true, categoria:cat};
            if(f==='imagen') { var s=(el.tagName==='IMG')?el.src:''; dic[id].imagen=s; dic[id].imagen_url=s; }
            else if(f.includes('precio')) dic[id].precio = parsePrecio(el.innerText);
            else dic[id][f] = el.innerText.trim();
        });
        window._fluixDB.collection('empresas').doc(empresaId).collection('contenido_web').doc(docId)
          .set({ tipo:'carta', nombre:nombre, activa:true, fecha:new Date(), contenido:{items_carta:Object.values(dic)} })
          .then(function(){ console.log('✅ Sincronizado '+nombre); });
    }

    function start() {
        var app = firebase.initializeApp(CFG.firebase, 'FluixApp');
        var db = app.firestore();
        window._fluixDB = db;
        initCarta(db);
        initProductos(db);
        console.log('Fluix Ready 🚀');
    }

    if(typeof firebase==='undefined') {
        cargarScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js', function(){
            cargarScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js', start);
        });
    } else start();

})();
</script>
