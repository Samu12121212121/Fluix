name: planeag_flutter
description: PlaneaGuada CRM para pymes
publish_to: 'none'

version: 1.0.9+11

environment:
  sdk: ^3.11.1

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.3.3
  firebase_storage: ^12.3.4
  cloud_functions: ^5.1.3
  firebase_crashlytics: ^4.1.3
  firebase_performance: ^0.10.0+8
  firebase_app_check: ^0.3.1+5

  # State Management
  provider: ^6.1.2

  # UI and Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Navigation
  go_router: ^14.2.7

  # Utilities
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  intl: ^0.20.2
  logger: ^2.4.0

  # Networking
  dio: ^5.7.0
  http: ^1.2.0

  # Connectivity
  connectivity_plus: ^6.0.5

  # DI
  get_it: ^8.0.0

  # Local Storage
  sqflite: ^2.4.0

  # Notifications
  flutter_local_notifications: ^17.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Image handling
  image_picker: ^1.1.2
  image: ^4.2.0

  # Charts for dashboard
  fl_chart: ^0.69.0

  # Form validation
  formz: ^0.7.0

  # Date formatting
  timeago: ^3.7.0

  # Object comparison
  equatable: ^2.0.5

  # Calendario visual de vacaciones
  table_calendar: ^3.1.2

  # Open URLs (Google Maps, etc.)
  url_launcher: ^6.3.1

  # Google Sign In
  google_sign_in: ^6.2.1

  # Apple Sign In (obligatorio App Store)
  sign_in_with_apple: ^6.1.4

  # PDF y exportación
  pdf: ^3.11.1
  printing: ^5.14.1
  path_provider: ^2.1.4
  share_plus: ^10.1.4
  csv: ^6.0.0

  # Criptografía y QR (Verifactu)
  crypto: ^3.0.3
  qr_flutter: ^4.1.0

  # Firma XAdES — certificado cualificado (NO VERI*FACTU, art. 12 RD 1007/2023)
  # asn1lib: parsing ASN.1 (PKCS12, X.509) | pointycastle: crypto RSA-SHA256 / 3DES / RC2
  pointycastle: ^3.7.3
  asn1lib: ^1.6.0
  archive: ^3.4.9
  flutter_secure_storage: ^9.2.2
  file_picker: ^8.1.2

  # Sonidos de notificación
  audioplayers: ^6.1.0

  # GPS (control horario / fichaje)
  geolocator: ^13.0.1

  # Impresora Bluetooth térmica (TPV)
  blue_thermal_printer: ^1.0.9

  # Visor de documentos
  photo_view: ^0.15.0
  flutter_pdfview: ^1.3.2
  flutter_image_compress: ^2.3.0
  path: ^1.9.0


  # ── SEGURIDAD ─────────────────────────────────────────────────────────────
  # Autenticación biométrica (FaceID / Huella dactilar)
  local_auth: ^2.3.0
  # Deep links para invitaciones de empleados
  app_links: ^6.3.3
  # Información del dispositivo (para log de auditoría)
  device_info_plus: ^10.1.2
  # Versión de la app (para log de auditoría)
  package_info_plus: ^8.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.12
  fake_cloud_firestore: ^3.1.0
  flutter_launcher_icons: ^0.14.3

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  uses-material-design: true

  assets:
    - assets/sounds/

# ── FLUTTER LAUNCHER ICONS ────────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

